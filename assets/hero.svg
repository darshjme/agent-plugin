<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8957e5;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#8957e5;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8957e5;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="56" x2="800" y2="56"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
  </g>

  <!-- Accent glow bar -->
  <rect x="0" y="270" width="800" height="3" fill="url(#accent_grad)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent_grad)"/>

  <!-- Animation area (right side) -->
  
  <g transform="translate(560, 60)">
    <rect x="0" y="30" width="90" height="60" rx="8" fill="#8957e5" fill-opacity="0.15" stroke="#8957e5" stroke-width="1.5"/>
    <text x="45" y="65" fill="#8957e5" font-size="11" text-anchor="middle" font-family="monospace">plugin_a</text>
    <rect x="110" y="30" width="90" height="60" rx="8" fill="#8957e5" fill-opacity="0.12" stroke="#8957e5" stroke-width="1.5"/>
    <text x="155" y="65" fill="#8957e5" font-size="11" text-anchor="middle" font-family="monospace">plugin_b</text>
    <rect x="55" y="110" width="90" height="60" rx="8" fill="#8957e5" fill-opacity="0.2" stroke="#8957e5" stroke-width="2">
      <animate attributeName="fill-opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="100" y="145" fill="#8957e5" font-size="11" text-anchor="middle" font-family="monospace">host</text>
    <line x1="90" y1="90" x2="100" y2="110" stroke="#8957e5" stroke-width="1.5"/>
    <line x1="110" y1="90" x2="100" y2="110" stroke="#8957e5" stroke-width="1.5"/>
  </g>

  <!-- Left: text content -->
  <!-- Package badge -->
  <rect x="40" y="38" width="110" height="22" rx="11" fill="#8957e5" fill-opacity="0.12" stroke="#8957e5" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95" y="53" fill="#8957e5" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">darshjme</text>

  <!-- Title -->
  <text x="40" y="110" fill="#f0f6fc" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-1">agent-plugin</text>

  <!-- Tagline -->
  <text x="40" y="148" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">Production plugin system for extending LLM agents — pure stdlib, zero de...</text>

  <!-- Divider -->
  <line x1="40" y1="170" x2="460" y2="170" stroke="#8957e5" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Pills -->
  
    <rect x="102" y="220" width="128" height="26" rx="13" fill="#8957e5" fill-opacity="0.15" stroke="#8957e5" stroke-width="1"/>
    <text x="166" y="237" fill="#8957e5" font-family="monospace" font-size="11" text-anchor="middle">Plugin Loader</text>
    <rect x="242" y="220" width="104" height="26" rx="13" fill="#8957e5" fill-opacity="0.15" stroke="#8957e5" stroke-width="1"/>
    <text x="294" y="237" fill="#8957e5" font-family="monospace" font-size="11" text-anchor="middle">Hot Reload</text>
    <rect x="358" y="220" width="184" height="26" rx="13" fill="#8957e5" fill-opacity="0.15" stroke="#8957e5" stroke-width="1"/>
    <text x="450" y="237" fill="#8957e5" font-family="monospace" font-size="11" text-anchor="middle">Dependency Injection</text>
    <rect x="554" y="220" width="144" height="26" rx="13" fill="#8957e5" fill-opacity="0.15" stroke="#8957e5" stroke-width="1"/>
    <text x="626" y="237" fill="#8957e5" font-family="monospace" font-size="11" text-anchor="middle">Lifecycle Hooks</text>
</svg>